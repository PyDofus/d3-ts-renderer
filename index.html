<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dofus Sprite Renderer — Test Harness</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 1rem; }
    label { display: block; margin-top: .5rem; font-size: .85rem; color: #aaa; }
    input, select { background: #16213e; color: #eee; border: 1px solid #555; padding: .4rem .6rem; width: 340px; margin-top: .2rem; }
    button { margin-top: .8rem; padding: .4rem 1rem; background: #0f3460; color: #eee; border: 1px solid #555; cursor: pointer; }
    button:hover { background: #533483; }
    #canvas-wrap { margin-top: 1rem; background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0 / 16px 16px; display: inline-block; }
    canvas { display: block; image-rendering: pixelated; }
    #error { margin-top: .5rem; color: #f55; white-space: pre-wrap; max-height: 200px; overflow: auto; }
    #info  { margin-top: .3rem; color: #8f8; font-size: .8rem; }
  </style>
</head>
<body>
  <h2>Dofus Sprite Renderer</h2>

  <label>Look string (or hex b16)
    <input id="look" type="text" value="{4907|||130}" />
  </label>
  <label>Animation name (leave empty for default)
    <input id="anim" type="text" placeholder="AnimStatique" />
  </label>
  <label>Direction
    <select id="direction">
      <option value="0">0 — RIGHT</option>
      <option value="1">1 — DOWN_RIGHT</option>
      <option value="2">2 — DOWN</option>
      <option value="3">3 — DOWN_LEFT</option>
      <option value="4">4 — LEFT</option>
      <option value="5">5 — UP_LEFT</option>
      <option value="6">6 — UP</option>
      <option value="7">7 — UP_RIGHT</option>
    </select>
  </label>
  <label>Scale
    <input id="scale" type="number" value="2" min="0.1" max="10" step="0.1" style="width:80px" />
  </label>

  <br/>
  <button id="renderBtn">Render</button>
  <button id="stopBtn" style="display:none">Stop</button>

  <div id="canvas-wrap"><canvas id="canvas" width="1" height="1"></canvas></div>
  <div id="info"></div>
  <pre id="error"></pre>

  <script type="module">
    // Import from the Vite dev server's built output.
    // Run `npm run dev` in ts-lib/ and open this file via that server.
    import { Look, DofusSprite, Directions, createDataLoader } from './src/index.ts';

    const renderBtn = document.getElementById('renderBtn');
    const stopBtn   = document.getElementById('stopBtn');
    const errorEl   = document.getElementById('error');
    const infoEl    = document.getElementById('info');
    const canvas    = document.getElementById('canvas');

    let rafId = null;
    let frameIndex = 0;

    stopBtn.addEventListener('click', () => {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
      stopBtn.style.display = 'none';
      renderBtn.style.display = '';
    });

    renderBtn.addEventListener('click', async () => {
      errorEl.textContent = '';
      infoEl.textContent = 'Loading…';
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }

      try {
        const lookStr  = document.getElementById('look').value.trim();
        const animName = document.getElementById('anim').value.trim() || undefined;
        const dir      = parseInt(document.getElementById('direction').value);
        const scale    = parseFloat(document.getElementById('scale').value) || 2;

        if (!lookStr) throw new Error('Look string is required');

        const look = lookStr.match(/^[0-9a-fA-F]{6,}$/)
          ? Look.fromB16String(lookStr)
          : Look.fromString(lookStr);

        infoEl.textContent = `Creating sprite for bone ${look.bone}…`;

        const sprite = await DofusSprite.create(look, canvas);

        const [resolvedAnim, flip] = sprite.getAnimName(dir, animName);
        infoEl.textContent = `Preparing animation '${resolvedAnim}'${flip ? ' (flipped)' : ''}…`;

        await sprite.prepareAnimation(resolvedAnim, scale, true);

        const frameCount = sprite.getFrameCount(resolvedAnim);
        infoEl.textContent = `Animation '${resolvedAnim}' — ${frameCount} frames`;

        frameIndex = 0;
        renderBtn.style.display = 'none';
        stopBtn.style.display = '';

        const FPS = 25;
        const MS_PER_FRAME = 1000 / FPS;
        let lastTime = 0;

        function tick(time) {
          rafId = requestAnimationFrame(tick);
          if (time - lastTime < MS_PER_FRAME) return;
          lastTime = time;
          sprite.renderFrame(frameIndex++);
        }
        rafId = requestAnimationFrame(tick);

      } catch (err) {
        errorEl.textContent = err instanceof Error ? `${err.name}: ${err.message}\n${err.stack ?? ''}` : String(err);
        infoEl.textContent = '';
      }
    });
  </script>
</body>
</html>
